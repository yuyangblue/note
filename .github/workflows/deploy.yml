name: Deploy MkDocs

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: pip install mkdocs-roamlinks-plugin
      - run: |
          mkdir -p docs
          cp -r 2026_turing docs/
          cp -r C++学习 docs/
          cp -r 大数据解析和应用导论 docs/
          cp -r 高等代数 docs/
          cp -r 工科数学分析 docs/
          cp -r 华中杯 docs/
          cp -r 计算机系统导论 docs/
          cp -r 临时作业 docs/
          cp -r 人工智能导引 docs/
          cp -r 深度学习 docs/
          cp -r 通识选修课复习 docs/
          cp -r 英语阅读 docs/
          cp README.md docs/ 2>/dev/null || true
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
