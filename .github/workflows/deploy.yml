name: Deploy MkDocs

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: pip install mkdocs-material

      # 把笔记复制到 docs/ 目录，排除不需要的东西
      - run: |
          mkdir -p docs
          cp -r 2026_turing docs/
          cp -r C++学习 docs/
          cp -r html学习 docs/
          cp -r Linux学习 docs/
          cp -r 大数据解析和应用导论 docs/
          cp -r 高等代数 docs/
          cp -r 工科数学分析 docs/
          cp -r 华中杯 docs/
          cp -r 疾病考古学 docs/
          cp -r 计算机系统导论 docs/
          cp -r 临时作业 docs/
          cp -r 民族传统体育 docs/
          cp -r 人工智能导引 docs/
          cp -r 深度学习 docs/
          cp -r 通识选修课复习 docs/
          cp -r 英语阅读 docs/
          cp README.md docs/ 2>/dev/null || true

      - run: mkdocs gh-deploy --force