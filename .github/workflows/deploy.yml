name: Deploy MkDocs

on:
  push:
    branches: [master]  # 改成你实际的主分支名，可能是 master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force